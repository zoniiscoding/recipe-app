services:
  - type: web
    name: recipe-garden-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
      - key: CLIENT_URL
        sync: false
